name: Sync photos from Google Drive

on:
  # Run automatically once an hour.
  schedule:
    - cron: "0 * * * *"
  # Let you trigger it by hand from the Actions tab.
  workflow_dispatch:
  # Also refresh whenever the site code changes.
  push:
    branches: [main]
    paths-ignore:
      - "images/**"

# Allow the workflow to commit the synced images back to the repo.
permissions:
  contents: write

concurrency:
  group: drive-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet Pillow

      - name: Sync from Drive
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          DRIVE_API_KEY: ${{ secrets.DRIVE_API_KEY }}
        run: python scripts/sync_drive.py

      - name: Commit changes
        run: |
          git config user.name "drive-sync-bot"
          git config user.email "actions@github.com"
          git add images
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Sync photos from Google Drive"
          # The remote main may have moved ahead since checkout (a queued run,
          # a manual push, etc.), which makes a bare push fail with "fetch first".
          # Rebase our image commit onto the latest main and retry.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing onto latest main..."
            git pull --rebase origin main
          done
          echo "Failed to push after 5 attempts." >&2
          exit 1
