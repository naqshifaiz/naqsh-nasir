<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naqsh Nasir — Portfolio</title>
  <meta name="description" content="Photography portfolio of Naqsh Nasir." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="wordmark" href="index.html">Naqsh&nbsp;Nasir</a>
    <nav class="nav">
      <a href="index.html" class="active">Portfolio</a>
      <a href="about.html">About &amp; Contact</a>
    </nav>
  </header>

  <main class="portfolio">
    <div id="gallery" class="gallery" aria-live="polite"></div>
    <p id="gallery-empty" class="gallery-empty" hidden>
      No photos yet. Add images to the linked Google&nbsp;Drive folder and they’ll appear here after the next sync.
    </p>
    <p id="gallery-loading" class="gallery-loading">Loading…</p>
  </main>

  <footer class="site-footer">
    <span>© <span id="year"></span> Naqsh Nasir</span>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" hidden role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" aria-label="Previous">&#8249;</button>
    <img class="lightbox-img" src="" alt="" />
    <button class="lightbox-nav lightbox-next" aria-label="Next">&#8250;</button>
    <div class="lightbox-caption"></div>
  </div>

  <script src="js/gallery.js"></script>
</body>
</html>
